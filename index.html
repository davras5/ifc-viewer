<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFC Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <!-- Gridstack -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack.min.css">
    <script src="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack-all.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <!-- Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/",
                "three/examples/jsm/utils/BufferGeometryUtils": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/utils/BufferGeometryUtils.js",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.5.23/build/index.module.js",
                "web-ifc": "https://unpkg.com/web-ifc@0.0.77/web-ifc-api.js",
                "web-ifc-three": "https://unpkg.com/web-ifc-three@0.0.126/IFCLoader.js"
            }
        }
    </script>

    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div id="app-layout">

    <div id="main-row">

        <!-- Left column: viewer + table stacked -->
        <div id="left-column">
            <div id="viewer-area">
                <div id="viewer-container"></div>

                <!-- Global loading overlay -->
                <div id="loading-overlay" class="loading-overlay hidden">
                    <div class="loading-card">
                        <i class="fa-solid fa-spinner fa-spin loading-icon"></i>
                        <span id="loading-text">Loading...</span>
                        <div class="loading-progress">
                            <div id="loading-bar" class="loading-bar"></div>
                        </div>
                        <div id="loading-log" class="loading-log"></div>
                    </div>
                </div>

                <!-- Toggle bar (top center) -->
                <div id="toggle-bar" class="toggle-bar glass-panel" role="toolbar" aria-label="Panel toggles">
                    <button id="tb-controls" class="tb-btn active" title="Controls" aria-label="Toggle controls panel">
                        <i class="fa-solid fa-upload" aria-hidden="true"></i>
                    </button>
                    <button id="tb-table" class="tb-btn" title="Table" aria-label="Toggle data table">
                        <i class="fa-solid fa-table" aria-hidden="true"></i>
                    </button>
                    <button id="tb-viewer-tools" class="tb-btn active" title="Viewer Tools" aria-label="Toggle viewer tools">
                        <i class="fa-solid fa-screwdriver-wrench" aria-hidden="true"></i>
                    </button>
                    <button id="tb-dashboard" class="tb-btn" title="Dashboard" aria-label="Toggle dashboard">
                        <i class="fa-solid fa-chart-pie" aria-hidden="true"></i>
                    </button>
                </div>

                <!-- Controls Panel -->
                <div id="controls-panel" class="absolute top-5 left-5 w-80 glass-panel rounded-xl p-4 flex flex-col gap-4 z-10">
                    <div class="flex items-center gap-3 border-b border-gray-200 pb-3">
                        <i class="fa-solid fa-cube text-2xl text-blue-600"></i>
                        <div>
                            <h1 class="font-bold text-gray-800 text-lg">IFC Viewer</h1>
                            <p class="text-xs text-gray-500">Engine: web-ifc 0.0.77</p>
                        </div>
                        <button id="controls-close" title="Close panel" aria-label="Close controls"><i class="fa-solid fa-times" aria-hidden="true"></i></button>
                    </div>

                    <input type="file" id="file-input" accept=".ifc" class="hidden" />

                    <div class="flex flex-col gap-2">
                        <button onclick="document.getElementById('file-input').click()"
                            class="w-full flex items-center justify-center py-2 bg-white border hover:bg-gray-50 rounded-lg text-sm font-medium transition shadow-sm">
                            <i class="fa-solid fa-folder-open text-blue-500 mr-2"></i> Open IFC
                        </button>

                        <button id="sample-btn"
                            class="w-full flex items-center justify-center py-2 bg-gray-50 border border-dashed hover:bg-white rounded-lg text-sm font-medium text-gray-600 transition shadow-sm">
                            <i class="fa-solid fa-rocket text-purple-500 mr-2"></i> Load Sample
                        </button>
                    </div>

                    <button id="export-btn" disabled
                        class="flex items-center justify-center w-full py-2 bg-emerald-600 hover:bg-emerald-700 text-white disabled:bg-gray-400 disabled:cursor-not-allowed rounded-lg text-sm font-medium transition shadow-sm">
                        <i class="fa-solid fa-file-excel mr-2"></i> Export Excel
                    </button>

                    <div id="status" class="hidden text-xs bg-blue-50 text-blue-700 p-2 rounded border border-blue-100 leading-relaxed break-words" role="status" aria-live="polite"></div>
                </div>

                <!-- Properties Panel -->
                <div id="prop-panel" class="absolute top-5 right-5 w-80 glass-panel rounded-xl hidden flex-col max-h-[80vh] z-10">
                    <div class="p-3 bg-gray-50 border-b flex justify-between items-center rounded-t-xl">
                        <span class="font-bold text-xs uppercase text-gray-600">Properties</span>
                        <button onclick="closePropPanel()" class="text-gray-400 hover:text-red-500" aria-label="Close properties"><i class="fa-solid fa-times" aria-hidden="true"></i></button>
                    </div>
                    <div id="prop-content" class="p-3 overflow-y-auto text-xs space-y-2"></div>
                </div>

                <!-- Table toggle -->
                <button id="tbl-toggle" class="tbl-toggle" title="Toggle table">
                    <i class="fa-solid fa-chevron-up tbl-toggle-arrow"></i>
                    <span>Table</span>
                </button>

                <!-- Viewer toolbar (bottom-left) -->
                <div id="viewer-toolbar" class="viewer-toolbar glass-panel" role="toolbar" aria-label="Viewer tools">
                    <div class="vt-dropdown">
                        <button id="vt-material" class="tb-btn active" title="View mode" aria-label="Change view mode">
                            <i class="fa-solid fa-fill-drip" aria-hidden="true"></i>
                            <i class="fa-solid fa-caret-up vt-caret" aria-hidden="true"></i>
                        </button>
                        <div id="vt-material-menu" class="vt-dropdown-menu">
                            <button class="vt-dropdown-item" data-mode="0"><i class="fa-solid fa-swatchbook"></i> Solid</button>
                            <button class="vt-dropdown-item active" data-mode="1"><i class="fa-solid fa-fill-drip"></i> IFC Materials</button>
                            <button class="vt-dropdown-item" data-mode="2"><i class="fa-solid fa-eye"></i> X-ray</button>
                            <button class="vt-dropdown-item" data-mode="3"><i class="fa-solid fa-border-none"></i> Wireframe</button>
                        </div>
                    </div>
                    <button id="vt-grid" class="tb-btn active" title="Toggle grid" aria-label="Toggle grid visibility">
                        <i class="fa-solid fa-border-all" aria-hidden="true"></i>
                    </button>
                    <button id="vt-pan" class="tb-btn" title="Pan mode" aria-label="Toggle pan mode">
                        <i class="fa-solid fa-hand" aria-hidden="true"></i>
                    </button>
                    <button id="vt-fps" class="tb-btn" title="First-person mode" aria-label="Toggle first-person navigation">
                        <i class="fa-solid fa-person-walking" aria-hidden="true"></i>
                    </button>
                    <button id="vt-measure" class="tb-btn" title="Measure (coming soon)" aria-label="Measure tool" disabled>
                        <i class="fa-solid fa-ruler" aria-hidden="true"></i>
                    </button>
                    <button id="vt-close" class="tb-btn vt-close-btn" title="Close toolbar" aria-label="Close viewer toolbar">
                        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                    </button>
                </div>

                <!-- Footer -->
                <div class="absolute bottom-4 right-4 z-10">
                    <a href="https://github.com/davras5/ifc-viewer/" target="_blank"
                       class="glass-footer px-3 py-2 rounded-full text-xs text-gray-300 hover:text-white hover:bg-gray-800 transition flex items-center gap-2 no-underline">
                        <i class="fa-brands fa-github text-lg"></i>
                        <span>davras5/ifc-viewer</span>
                    </a>
                </div>

            </div>

            <!-- Table panel (inside left column) -->
            <div id="table-panel"></div>
        </div>

        <!-- Right: Dashboard panel (full height) -->
        <div id="right-panel" class="right-panel">
            <div id="rp-resize-handle" class="rp-resize-handle"></div>
            <div id="dashboard-panel" class="dashboard-panel">
                <div class="dashboard-header">
                    <span class="dashboard-title"><i class="fa-solid fa-chart-pie"></i> Dashboard</span>
                    <button id="dashboard-close" class="dashboard-close" title="Close dashboard" aria-label="Close dashboard"><i class="fa-solid fa-times" aria-hidden="true"></i></button>
                </div>
                <div id="color-legend" class="color-legend"></div>
                <div id="gs-grid" class="grid-stack"></div>
                <button id="add-widget-btn" class="add-widget-btn">
                    <i class="fa-solid fa-plus"></i> Add Widget
                </button>
            </div>
        </div>

    </div>

</div>

<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
